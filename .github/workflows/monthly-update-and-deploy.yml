name: deploy-site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/monthly-update-and-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "conference-tracker-pages"
  cancel-in-progress: true

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  publish:
    needs: deploy-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
